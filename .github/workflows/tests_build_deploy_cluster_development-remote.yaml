name: tests_build_deploy_cluster_development-remote

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  tests_build_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode .env.keys file
        run: |
          echo "${{ secrets.ENCRYPTED_ENV_KEYS_ADONISJS }}" | base64 --decode > .env.keys

      - name: Install Node.js to specific version LTS and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies for project
        run: npm install

      - name: Lint TypeScript and ESLint for project
        run: npm run lint:ts && npm run lint:eslint

      - name: Setup Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Build and run with Docker Compose
        run: |
          docker-compose up --build -d

      - name: Check services healthiness
        uses: thegabriele97/dockercompose-health-action@main
        with:
          timeout: '60'
          workdir: '.'

      - name: Japa - Run Unit Tests and Functional Tests
        run: npm run test:all

      - name: Shutdown Docker Compose
        run: |
          docker-compose down

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/development-remote/Dockerfile
          push: true
          tags: corentin35/project-kubequest-backend:develop-${{ github.sha }}

      - name: Replace image tag in deployment.yaml for Kubernetes
        run: |
          sed -i 's/\${TAG_VERSION}/'${{ github.sha }}'/g' k8s/development-remote/deployment.yaml

      - name: Configure Git user
        run: |
          git config user.name "ci"
          git config user.email "ci@flapi.org"

      - name: Authenticate with PAT
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}
          git remote -v

      - name: Commit and push updated deployment
        run: |
          git fetch origin
          git checkout develop
          git add k8s/development-remote/deployment.yaml
          git commit -m "ci: update image tag t develop-${{ github.sha }}"
          git push
