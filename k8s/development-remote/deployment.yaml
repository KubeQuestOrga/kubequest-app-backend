apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-project-kubequest-backend-deployment
  namespace: dev-project-kubequest-backend
  labels:
    app: dev-project-kubequest-backend
spec:
  selector:
    matchLabels:
      app: dev-project-kubequest-backend
  template:
    metadata:
      labels:
        app: dev-project-kubequest-backend
    spec:
      containers:
        - name: dev-project-kubequest-backend
          image: corentin35/project-kubequest-backend:develop-4c10507515bf11fe8fc194b9ded3295df75afd9a
          imagePullPolicy: Always
          ports:
            - containerPort: 3333
          env:
            - name: PORT
              value: '3333'
          resources:
            requests:
              cpu: '300m'
              memory: '400Mi'
            limits:
              cpu: '600m'
              memory: '800Mi'
      imagePullSecrets:
        - name: regcred
