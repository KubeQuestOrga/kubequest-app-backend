apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dev-project-kubequest-backend-ingress
  namespace: dev-project-kubequest-backend
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dev.kubequest.api.flapi.org
      secretName: dev-project-kubequest-backend-tls
  rules:
    - host: dev.kubequest.api.flapi.org
      http:
        paths:
          - pathType: Prefix
            path: '/'
            backend:
              service:
                name: dev-project-kubequest-backend-service
                port:
                  number: 3333
