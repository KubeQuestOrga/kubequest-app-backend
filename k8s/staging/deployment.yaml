apiVersion: apps/v1
kind: Deployment
metadata:
  name: staging-project-kubequest-backend-deployment
  namespace: staging-project-kubequest-backend
  labels:
    app: staging-project-kubequest-backend
spec:
  selector:
    matchLabels:
      app: staging-project-kubequest-backend
  template:
    metadata:
      labels:
        app: staging-project-kubequest-backend
    spec:
      containers:
        - name: staging-project-kubequest-backend
          image: corentin35/project-kubequest-backend:staging-${TAG_VERSION}
          imagePullPolicy: Always
          ports:
            - containerPort: 3333
          env:
            - name: PORT
              value: '3333'
          resources:
            requests:
              cpu: '300m'
              memory: '400Mi'
            limits:
              cpu: '600m'
              memory: '800Mi'
      imagePullSecrets:
        - name: regcred
