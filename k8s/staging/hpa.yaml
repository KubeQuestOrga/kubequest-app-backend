apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: staging-project-kubequest-backend-hpa
  namespace: staging-project-kubequest-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: staging-project-kubequest-backend-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
