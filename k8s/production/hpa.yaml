apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: prod-project-kubequest-backend-hpa
  namespace: prod-project-kubequest-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: prod-project-kubequest-api-backend-deployment
  minReplicas: 3
  maxReplicas: 15
  targetCPUUtilizationPercentage: 70
