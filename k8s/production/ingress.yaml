apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prod-project-kubequest-backend-ingress
  namespace: prod-project-kubequest-backend
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - kubequest.api.flapi.org
      secretName: prod-project-kubequest-backend-tls
  rules:
    - host: kubequest.api.flapi.org
      http:
        paths:
          - pathType: Prefix
            path: '/'
            backend:
              service:
                name: prod-project-kubequest-backend-service
                port:
                  number: 3333
